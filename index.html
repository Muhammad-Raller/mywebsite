<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raller Pro</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
    }
    /* Loading screen */
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      background: #111;
      color: #fff;
      font-size: 24px;
      animation: fadeInOut 3s ease-in-out;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }
    /* Main content hidden initially */
    #main {
      display: none;
      padding: 20px;
      text-align: center;
    }
    #chatbot {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading">Loading Raller Pro...</div>

  <!-- Main content -->
  <div id="main">
    <h1>Welcome to Raller Pro</h1>
    <p>Your AI assistant is ready!</p>

    <!-- Embedded Jotform chatbot -->
    <div id="chatbot">
      <script src="https://cdn.jotfor.ms/agent/embedjs/019e87c0c6167641a13db443dd9e531826ab/embed.js"></script>
    </div>
  </div>

  <script>
    // Show loading screen for 3 seconds, then reveal main content
    setTimeout(function() {
      document.getElementById("loading").style.display = "none";
      document.getElementById("main").style.display = "block";
    }, 3000);
  </script>
</body>
</html>
